name: "[REUSABLE] Security Suite"

# Geolonia's consolidated per-PR security suite, as a single reusable.
#
# Two thin callers use it, so the suite logic lives in exactly one place:
#
#   * .github/workflows/security-suite.yml  the org "required workflow"
#     (Repository Rulesets) that runs on every targeted repo with no file
#     in that repo.
#   * workflow-templates/security-suite.yml  the "New workflow" picker
#     entry, for repos that opt in manually instead of via the ruleset.
#
# It fans out to the org reusable scanners plus an inline zizmor job:
#
#   * bumblebee   supply-chain package inventory vs. threat-intel catalogs
#   * betterleaks secret-leak gate (PR diff)
#   * pinact      GitHub Actions SHA-pinning check
#   * zizmor      GitHub Actions static analysis (dangerous triggers such
#                 as pull_request_target / workflow_run with untrusted
#                 checkout, template injection, excessive permissions,
#                 credential persistence)
#
# The scanners run in report-mode: summary (they stay quiet and only expose
# status / count outputs), and the final `report` job posts ONE consolidated
# comment for the whole suite. So contributors see a single tidy result
# instead of one comment per scanner.
#
# Permissions note: a called reusable can only downgrade the caller's token,
# never elevate it. The jobs below need pull-requests: write (to comment) and
# issues: write (bumblebee tracking issue on non-PR triggers), so the CALLER
# job's `uses:` must grant that union; each job here narrows to what it needs.
#
# Rollout ramp: zizmor runs warn-only (its step is continue-on-error) so we
# can observe findings org-wide before blocking. Flip to enforce by removing
# continue-on-error from the Run zizmor step.
#
# Pinning: the sibling scanner reusables below are SHA-pinned, NOT floated on
# @v1. This reusable sits in the org "required workflow" tree (security-suite.yml
# -> here -> scanners), and the ruleset "require workflows" injector runs a
# required workflow ONLY when its ENTIRE reusable tree is immutably pinned; a
# moving tag anywhere in the tree makes the injector silently produce no run,
# so the required check hangs at "Expected" forever on every consumer PR (see
# .github#88 / the v1.27-v1.29 regression). So bump these SHAs on each release.
# Third-party actions used inside jobs (checkout, zizmor-action) are SHA-pinned
# as usual. (workflow-templates/security-suite.yml may still use @v1: it is a
# normal, non-injected workflow where moving tags resolve fine.)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  supply-chain:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: geolonia/.github/.github/workflows/reusable-bumblebee-scan.yml@0d7d0f2ef99869b08f125c075214994a947de901 # v1.29.0
    with:
      report-mode: summary

  secret-leak:
    permissions:
      contents: read
      pull-requests: write
    uses: geolonia/.github/.github/workflows/reusable-secret-leak-check.yml@0d7d0f2ef99869b08f125c075214994a947de901 # v1.29.0
    with:
      report-mode: summary

  action-pinning:
    permissions:
      contents: read
    uses: geolonia/.github/.github/workflows/reusable-pinact-check.yml@0d7d0f2ef99869b08f125c075214994a947de901 # v1.29.0
    with:
      # Warn-only in the suite: an unpinned or comment-mismatched action
      # reports a warning row instead of blocking the PR. (pinact also
      # falls back to the centralized .pinact.yml when the repo has none.)
      fail-on-findings: false

  actions-audit:
    name: zizmor (GitHub Actions audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      # ok when zizmor exits clean, warn otherwise (warn-only rollout).
      status: ${{ steps.zizmor.outcome == 'success' && 'ok' || 'warn' }}
      # finding counts by severity level (error / warning / notice) from the
      # SARIF count pass, so the summary shows the full breakdown. Computed
      # in-job (no Checks API), same zizmor version + config as the run above.
      errors: ${{ steps.counts.outputs.errors }}
      warnings: ${{ steps.counts.outputs.warnings }}
      notices: ${{ steps.counts.outputs.notices }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Ensure zizmor config
        # Centralized ignore-list: when the repo ships no zizmor.yml, fetch
        # the canonical one from geolonia/.github@main so org-wide accepted
        # findings are suppressed in one place. zizmor auto-discovers a
        # zizmor.yml at the repo root. A repo can override with its own.
        env:
          GH_TOKEN: ${{ github.token }}
          CONFIG_REPO: geolonia/.github
          CONFIG_REF: main
        run: |
          if [ -f zizmor.yml ] || [ -f zizmor.yaml ] || [ -f .github/zizmor.yml ] || [ -f .github/zizmor.yaml ]; then
            echo "Using this repo's own zizmor config."
          elif gh api "repos/${CONFIG_REPO}/contents/zizmor.yml?ref=${CONFIG_REF}" \
                 -H "Accept: application/vnd.github.raw" > zizmor.yml 2>/dev/null && [ -s zizmor.yml ]; then
            echo "::notice::No zizmor.yml in this repo; using the centralized ignore-list from ${CONFIG_REPO}@${CONFIG_REF}."
          else
            rm -f zizmor.yml
            echo "No centralized zizmor config available; zizmor uses its defaults."
          fi
      - name: Run zizmor
        id: zizmor
        # Warn-only during rollout: the step swallows its own failure so the
        # job (and the run) still passes, while we capture the outcome above.
        # Remove continue-on-error to make zizmor findings block the PR.
        continue-on-error: true
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # SARIF upload to the security tab needs GitHub Advanced Security,
          # which is not available on private repos without a license. Use
          # workflow annotations instead so the job behaves identically on
          # public, internal, and private repos.
          advanced-security: false
          annotations: true
          # Pin the zizmor CLI so the inline annotations match the SARIF
          # count pass below (which pins the same version). v0.5.7 knows
          # 1.26.1. Bump both together (Dependabot bumps the action SHA).
          version: "1.26.1"
      - name: Count findings by severity
        id: counts
        # A second zizmor pass emitting SARIF so the summary can show the
        # error / warning / notice breakdown. Same pinned version and the
        # same auto-discovered zizmor.yml as the run above, so the counts
        # match the inline annotations. Computed in-job (no Checks API).
        # pipx is preinstalled on GitHub-hosted runners.
        continue-on-error: true
        run: |
          pipx run --spec "zizmor==1.26.1" zizmor --persona regular --format sarif . > zizmor.sarif 2>/dev/null || true
          count() { local n; n=$(jq --arg L "$1" '[.runs[]?.results[]? | select(.level == $L)] | length' zizmor.sarif 2>/dev/null); echo "${n:-0}"; }
          {
            echo "errors=$(count error)"
            echo "warnings=$(count warning)"
            echo "notices=$(count note)"
          } >> "$GITHUB_OUTPUT"

  report:
    name: Security Suite summary
    needs: [supply-chain, secret-leak, action-pinning, actions-audit]
    # always(): report even when a check failed. Only meaningful on PRs.
    if: always() && github.event.pull_request.number != null
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post / update the consolidated comment
    steps:
      - name: Build and post consolidated comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SUPPLY_STATUS: ${{ needs.supply-chain.outputs.status }}
          SUPPLY_TOTAL: ${{ needs.supply-chain.outputs.total }}
          SECRET_STATUS: ${{ needs.secret-leak.outputs.status }}
          SECRET_TOTAL: ${{ needs.secret-leak.outputs.total }}
          PIN_STATUS: ${{ needs.action-pinning.outputs.status }}
          ZIZMOR_STATUS: ${{ needs.actions-audit.outputs.status }}
          ZIZMOR_ERRORS: ${{ needs.actions-audit.outputs.errors }}
          ZIZMOR_WARNINGS: ${{ needs.actions-audit.outputs.warnings }}
          ZIZMOR_NOTICES: ${{ needs.actions-audit.outputs.notices }}
        run: |
          set -euo pipefail
          MARKER="<!-- security-suite-v1 -->"

          # Map a status token (ok|warn|fail|error) to a glyph.
          glyph() {
            case "$1" in
              ok) printf '✅' ;;
              warn) printf '⚠️' ;;
              fail) printf '❌' ;;
              *) printf '🟠' ;;
            esac
          }

          # Default empty outputs (e.g. a job that errored before setting one)
          # to "error" so the row is never blank.
          SUPPLY_STATUS="${SUPPLY_STATUS:-error}"
          SECRET_STATUS="${SECRET_STATUS:-error}"
          PIN_STATUS="${PIN_STATUS:-error}"
          ZIZMOR_STATUS="${ZIZMOR_STATUS:-error}"

          msg() {
            local status="$1" ok="$2" some="$3"
            case "${status}" in
              ok) echo "${ok}" ;;
              warn|fail) echo "${some}" ;;
              *) echo "Scan error (see run)" ;;
            esac
          }

          SUPPLY_MSG=$(msg "${SUPPLY_STATUS}" "No exposure matches" "${SUPPLY_TOTAL:-?} match(es)")
          SECRET_MSG=$(msg "${SECRET_STATUS}" "No secrets in diff" "${SECRET_TOTAL:-?} potential secret(s)")
          case "${PIN_STATUS}" in
            ok) PIN_MSG="All actions pinned" ;;
            warn) PIN_MSG="Unpinned or mismatched (warn-only; see run)" ;;
            fail) PIN_MSG="Unpinned or mismatched (see run)" ;;
            *) PIN_MSG="Did not complete" ;;
          esac

          # zizmor is warn-only. Show the full severity breakdown (from the
          # SARIF count pass) so errors are never understated as warnings.
          ZE="${ZIZMOR_ERRORS:-0}"; ZW="${ZIZMOR_WARNINGS:-0}"; ZN="${ZIZMOR_NOTICES:-0}"
          ZIZMOR_BREAKDOWN="${ZE} error(s), ${ZW} warning(s), ${ZN} notice(s) (warn-only; see annotations)"
          if [ "${ZIZMOR_STATUS}" = "ok" ]; then
            ZIZMOR_GLYPH="✅"; ZIZMOR_SEV="ok"; ZIZMOR_MSG="No findings"
          elif [ "${ZIZMOR_STATUS}" != "warn" ]; then
            # status defaulted to "error" (the actions-audit job did not
            # publish outputs, e.g. it failed/was skipped) -> surface it as a
            # scan error, not warning-only findings.
            ZIZMOR_GLYPH="🟠"; ZIZMOR_SEV="error"; ZIZMOR_MSG="Scan error (see run)"
          elif [ "${ZE}" -gt 0 ]; then
            ZIZMOR_GLYPH="❗"; ZIZMOR_SEV="error"; ZIZMOR_MSG="${ZIZMOR_BREAKDOWN}"
          elif [ "${ZW}" -gt 0 ] || [ "${ZN}" -gt 0 ]; then
            ZIZMOR_GLYPH="⚠️"; ZIZMOR_SEV="warn"; ZIZMOR_MSG="${ZIZMOR_BREAKDOWN}"
          else
            # status=warn but counts came back 0 (e.g. the count pass failed);
            # do not claim "no findings".
            ZIZMOR_GLYPH="⚠️"; ZIZMOR_SEV="warn"; ZIZMOR_MSG="Findings (warn-only; see annotations)"
          fi

          # Overall callout. Hard gates (bumblebee/betterleaks/pinact) can
          # block; zizmor is warn-only (never blocks) but error-severity
          # findings still escalate the callout so they are not hidden.
          GATES="${SUPPLY_STATUS} ${SECRET_STATUS} ${PIN_STATUS}"
          if printf '%s' "${GATES}" | grep -qwE "fail|error"; then
            CALLOUT="> [!CAUTION]"$'\n'"> A required check did not pass. See the rows above and the workflow run."
          elif [ "${ZIZMOR_SEV}" = "error" ]; then
            CALLOUT="> [!CAUTION]"$'\n'"> zizmor found error-severity issues. They are warn-only (they do not block this PR), but please address them."
          elif printf '%s' "${GATES}" | grep -qw "warn" || [ "${ZIZMOR_SEV}" = "warn" ]; then
            CALLOUT="> [!WARNING]"$'\n'"> Warnings only. These do not block the PR, but please review them."
          else
            CALLOUT="> [!NOTE]"$'\n'"> All security checks passed."
          fi

          BODY_FILE="suite-comment.md"
          {
            echo "${MARKER}"
            echo ""
            echo "## 🛡️ Security suite"
            echo ""
            echo "| Check | Result |"
            echo "|:--|:--|"
            echo "| $(glyph "${SUPPLY_STATUS}") Supply chain · \`bumblebee\` | ${SUPPLY_MSG} |"
            echo "| $(glyph "${SECRET_STATUS}") Secrets · \`betterleaks\` | ${SECRET_MSG} |"
            echo "| $(glyph "${PIN_STATUS}") Action pinning · \`pinact\` | ${PIN_MSG} |"
            echo "| ${ZIZMOR_GLYPH} Actions audit · \`zizmor\` | ${ZIZMOR_MSG} |"
            echo ""
            echo "${CALLOUT}"
            echo ""
            echo "<sub>Updated for \`${HEAD_SHA:0:7}\` · <a href=\"${RUN_URL}\">workflow run</a></sub>"
          } > "${BODY_FILE}"

          # Find a prior consolidated comment by its marker. Reads work even
          # with the read-only token on fork PRs, so this lookup is strict:
          # an empty result means "no match" (jq's // empty), but a real
          # API/auth failure exits non-zero and fails the job (set -e) rather
          # than being masked into a duplicate post. Note: gh's --slurp is
          # incompatible with --jq, so use plain --paginate + .[].
          EXISTING=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq "[.[] | select(.body | startswith(\"${MARKER}\"))] | .[0].id // empty")

          # Posting is best-effort: PRs from forks (and Dependabot) get a
          # read-only GITHUB_TOKEN regardless of the permissions block, so the
          # write 403s. Warn instead of failing the whole suite; zizmor
          # findings still surface as inline annotations.
          if [ -n "${EXISTING}" ]; then
            if gh api -X PATCH "repos/${REPO}/issues/comments/${EXISTING}" \
                 -f body="$(cat "${BODY_FILE}")" >/dev/null; then
              echo "Updated consolidated comment (#${EXISTING})."
            else
              echo "::warning::Could not update the consolidated comment (read-only token on a fork PR?)."
            fi
          else
            if gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body-file "${BODY_FILE}" >/dev/null; then
              echo "Posted consolidated comment."
            else
              echo "::warning::Could not post the consolidated comment (read-only token on a fork PR?)."
            fi
          fi
