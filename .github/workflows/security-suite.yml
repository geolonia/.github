name: Security Suite

# Geolonia's per-PR security gate, as a thin caller of the reusable suite.
#
# This file is the org "required workflow": point a Repository Ruleset
# ("Require workflows to pass before merging") at
#
#   geolonia/.github/.github/workflows/security-suite.yml@<ref>
#
# and every targeted repo runs the suite with NO file of its own.
# geolonia/.github is public, so the ruleset can target public, internal,
# and private repos. The same thin caller is also offered in the org "New
# workflow" picker (workflow-templates/security-suite.yml) for repos that
# opt in manually instead of via the ruleset. Do not run both on one repo.
#
# All suite logic (bumblebee, betterleaks, pinact, zizmor, and the single
# consolidated PR comment) lives in the reusable so there is one source of
# truth. See reusable-security-suite.yml.

on:
  pull_request:
    branches:
      - main

# Serialize runs per PR so two overlapping runs cannot both miss the marker
# comment and each post a "single" consolidated comment.
concurrency:
  group: security-suite-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  suite:
    # A called reusable can only downgrade the caller's token, so grant the
    # union the suite's jobs need (comment + bumblebee tracking issue); the
    # reusable narrows each job to its own minimum.
    permissions:
      contents: read
      pull-requests: write
      issues: write
      checks: read # report job reads zizmor check-run annotations
    uses: geolonia/.github/.github/workflows/reusable-security-suite.yml@39820bb4238be1f3160e8d705c7c2942013711cb # v1.24.0
