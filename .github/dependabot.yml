# Dependabot keeps GitHub Actions SHA pins current: it bumps both the
# commit SHA and the trailing version comment, so SHA-pinning never goes
# stale. Pairs with the Action Pinning Check (pinact) CI gate and the
# repo .pinact.yml minimum release age.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Defer brand-new releases (the GitHub Actions analog of pnpm's
    # minimumReleaseAge). One day longer than .pinact.yml's 7-day
    # min_age: Dependabot counts calendar days while pinact enforces an
    # exact 168h floor, so an 8-day cooldown guarantees a Dependabot PR
    # always clears the pinact CI gate on arrival (no boundary-race red
    # check).
    cooldown:
      default-days: 8
    groups:
      # Batch minor and patch bumps into a single weekly PR. Majors are
      # excluded here, so breaking upgrades arrive as individual PRs that
      # get isolated review. Security updates also stay individual
      # (groups defaults to applies-to: version-updates).
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
