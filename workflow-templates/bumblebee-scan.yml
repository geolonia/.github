name: Bumblebee Scan

on:
  pull_request:
    branches: [$default-branch]
  push:
    branches: [$default-branch]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    uses: geolonia/.github/.github/workflows/reusable-bumblebee-scan.yml@v1
