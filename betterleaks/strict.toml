# Strict betterleaks config — all rules enabled, including the
# noise-prone generic-api-key rule that is disabled by default org-wide.
#
# When to use: repos that handle PII, payment data, or production
# credentials and want maximum coverage at the cost of more false
# positives. Pair with an `[[allowlist]]` block for known-good values
# in your repo (e.g. test fixtures, public-by-design tokens).
#
# Adopt: copy this file to your repo root as `.betterleaks.toml`, or
# point the workflow at it via the `config-path` input.

[extend]
useDefault = true
# (no disabledRules: all built-in detectors stay on)

# Example allowlist for a repo using this config. Customise as needed.
# Remove this whole block if you have nothing to allowlist.
#
# [[allowlist]]
# description = "Test fixtures with hand-rolled fake API keys"
# paths = ['''^test/fixtures/''']
# regexes = ['''(?i)fake[-_]?api[-_]?key''']
